[package]
name          = "oscal"
version       = "0.1.1"
edition.workspace     = true
rust-version.workspace = true
license.workspace     = true
repository.workspace  = true
description   = "Serde types for the OSCAL (Open Security Controls Assessment Language) data models. Generated from the official NIST Metaschema, covering all seven OSCAL document types. Ships embedded community catalogs for AI governance and security frameworks."
readme        = "../../README.md"
homepage      = "https://github.com/agentcarousel/oscal-rs"
documentation = "https://docs.rs/oscal"
keywords      = ["oscal", "nist", "compliance", "security", "serde"]
categories    = ["data-structures", "encoding"]

[lints]
workspace = true

[dependencies]
serde.workspace     = true
serde_json.workspace = true
uuid.workspace      = true
chrono.workspace    = true
url.workspace       = true
thiserror.workspace = true
